<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Affiche style suisse avec grille</title>
  <desc id="desc">Composition geometrique inspirée du style typographique international, avec grille et sans-serif.</desc>
  <rect width="1200" height="800" fill="#f4f1e8"/>
  <g stroke="#c7c3b7" stroke-width="1">
    <path d="M120 80V720M240 80V720M360 80V720M480 80V720M600 80V720M720 80V720M840 80V720M960 80V720M1080 80V720"/>
    <path d="M120 80H1080M120 200H1080M120 320H1080M120 440H1080M120 560H1080M120 680H1080"/>
  </g>
  <rect x="120" y="80" width="360" height="360" fill="#d94130"/>
  <rect x="480" y="320" width="240" height="120" fill="#121212"/>
  <rect x="840" y="560" width="240" height="120" fill="#1a5c9e"/>
  <text x="520" y="150" font-family="Helvetica, Arial, sans-serif" font-size="62" font-weight="700" fill="#111">MUSIK</text>
  <text x="520" y="215" font-family="Helvetica, Arial, sans-serif" font-size="62" font-weight="700" fill="#111">FEST</text>
  <text x="520" y="305" font-family="Helvetica, Arial, sans-serif" font-size="34" fill="#222">ZURICH 1961</text>
  <text x="840" y="130" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#333">International Typographic Style</text>
  <text x="840" y="165" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#444">grid / asymmetry / sans-serif</text>
</svg>
