<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Affiche typographique style suisse</title>
  <desc id="desc">Affiche abstraite inspirée du style suisse avec hiérarchie typographique et blocs géométriques.</desc>
  <rect width="1200" height="800" fill="#f7f5ef"/>
  <rect x="80" y="80" width="1040" height="640" fill="none" stroke="#bfbab0" stroke-width="2"/>
  <rect x="80" y="80" width="240" height="640" fill="#111"/>
  <rect x="320" y="80" width="120" height="640" fill="#d94130"/>
  <text x="480" y="185" font-family="Helvetica, Arial, sans-serif" font-size="88" font-weight="700" fill="#111">KONZERT</text>
  <text x="480" y="280" font-family="Helvetica, Arial, sans-serif" font-size="42" fill="#222">Basel • 1964</text>
  <text x="480" y="365" font-family="Helvetica, Arial, sans-serif" font-size="26" fill="#333">Josef Muller-Brockmann</text>
  <text x="480" y="410" font-family="Helvetica, Arial, sans-serif" font-size="26" fill="#333">Armin Hofmann</text>
  <text x="480" y="520" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#444">Helvetica / Univers / Akzidenz-Grotesk</text>
  <g fill="#f2efe7">
    <circle cx="200" cy="220" r="44"/>
    <circle cx="200" cy="340" r="44"/>
    <circle cx="200" cy="460" r="44"/>
    <circle cx="200" cy="580" r="44"/>
  </g>
</svg>
